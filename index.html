<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>3D Vízi Csúszda Építő</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui-panel { 
            position: absolute; top: 120px; left: 20px; width: 280px; 
            background: rgba(0,0,0,0.8); color: white; padding: 15px; 
            border-radius: 8px; max-height: 70vh; overflow-y: auto; z-index: 100;
            border: 1px solid #444;
        }
        .param-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input, select { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 5px; margin-bottom: 5px; }
        button.add-btn { background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; width: 100%; margin-top: 5px; }
        button.rem-btn { background: #dc3545; color: white; border: none; padding: 2px 5px; float: right; cursor: pointer; }
        .segment-card { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-left: 3px solid #0088ff; }
</style>
<body>
		<div id="timerDisplay" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 32px; font-weight: bold; color: #ffcc00; font-family: monospace; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 8px;">
			00:00.00
		</div>
    <button id="pauseBtn" style="position: absolute; top: 20px; left: 20px; z-index: 10; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #ff7700; color: white; border: none; border-radius: 5px; font-family: sans-serif; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
        Kamera Megállítása
    </button>
	<button id="modeBtn" style="position: absolute; top: 70px; left: 20px; z-index: 10; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0088ff; color: white; border: none; border-radius: 5px; font-family: sans-serif; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
        Mód: Sorrendi
    </button>
	<div id="ui-panel">
        <div class="param-group">
            <label>Csúszda átmérő (m)</label>
            <input type="number" id="slideDiameter" step="0.1" value="2.0">
            <label>Lejtés meredeksége</label>
            <input type="number" id="globalSlope" step="0.01" value="0.055">
            <label>Kifutó színe</label>
            <input type="color" id="runoutColor" value="#0088ff" onchange="rebuildSlide()">
			<label>Idő mód</label>
            <select id="timeMode" onchange="toggleTimeInput(); rebuildSlide();">
                <option value="real">Valós idő (PC óra)</option>
                <option value="fixed">Fix időpont</option>
            </select>
            <div id="fixedTimeContainer" style="display:none; gap:5px; margin-top:5px;">
                <input type="number" id="fixedHour" min="0" max="23" value="12" style="width:45%;" onchange="rebuildSlide()"> :
                <input type="number" id="fixedMinute" min="0" max="59" value="0" style="width:45%;" onchange="rebuildSlide()">
            </div>
			<label style="margin-top: 10px; color: #ff7700;">Kiválasztott pálya (Többpályás esetén)</label>
            <input type="number" id="selectedLane" min="1" max="6" value="1" onchange="rebuildSlide()">
			<label style="display:inline-flex; align-items:center; cursor:pointer; color:#aaa; margin-top: 10px; font-size:12px;">
                <input type="checkbox" id="allowLightBleed" checked onchange="toggleLightBleed(this.checked)" style="width:auto; margin-right:8px; margin-bottom:0; cursor:pointer;">
                Fényáteresztő csúszdafal (beszűrődő fény)
            </label>
        </div>
		<div class="param-group" style="border-top: 1px solid #444; padding-top: 10px; margin-top: 10px;">
    		<label>Statisztika:</label>
    		<div style="font-size: 14px; color: #ffcc00;">
       		Hossz: <span id="lengthVal">0</span> m<br>
        	Magasság: <span id="heightVal">0</span> m
    	</div>
</div>
        <div id="segments-container"></div>
			<button class="add-btn" onclick="addSegmentUI()">+ Új szakasz hozzáadása</button>
			<button class="add-btn" style="background:#ff7700; margin-top:15px;" onclick="rebuildSlide()">FRISSÍTÉS / ÉPÍTÉS</button>
			<button class="add-btn" style="background:#17a2b8; margin-top:15px;" onclick="saveTrack()">Mentés (JSON)</button>
			<button class="add-btn" style="background:#6c757d; margin-top:5px;" onclick="document.getElementById('fileInput').click()">Betöltés</button>
			<button class="add-btn" style="background:#007bff; margin-top:5px;" onclick="randomBodySlideGenerator()">
				RANDOM TESTCSÚSZDA (100m)
			</button>
			<button class="add-btn" style="background:#9900ff; margin-top:5px;" onclick="randomStarGateGenerator()">
				RANDOM GUMIS CSÚSZDA (60m)
			</button>
			<input type="file" id="fileInput" style="display:none" accept=".json" onchange="loadTrack(event)">
			<button class="add-btn" id="viewBtn" style="background:#444; margin-top:5px;">Nézet: Belső</button>
			<label>Sebesség (m/s)</label>
			<input type="number" id="moveSpeed" step="0.5" value="2.0">
			<label style="color:#00ff88; font-weight:bold;">ALGORITMIKUS HOSSZABBÍTÁS</label>
			<div style="display:flex; gap:5px; margin-bottom:5px;">
				<select id="extendPosition" style="flex:1; background:#222; color:#fff; border:1px solid #555;">
					<option value="end">Pálya végére</option>
					<option value="start">Pálya elejére</option>
				</select>
				<input type="number" id="extendCount" value="3" min="1" max="10" style="width:50px; text-align:center; background:#222; color:#fff; border:1px solid #555;">
			</div>
			<button class="add-btn" style="background:#00ff88; color:#000; font-weight:bold; margin-top:5px;" onclick="algorithmicExtend()">
				KITERJESZTÉS GENERÁLÁSA
			</button>
		</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>
<script type="module">
	window.toggleTimeInput = function() {
		const mode = document.getElementById('timeMode').value;
		document.getElementById('fixedTimeContainer').style.display = mode === 'fixed' ? 'flex' : 'none';
	};
	let orangeColor = 0x884400;
	let slideTime = 0;
	let timerRunning = false;
	const timerDisplay = document.getElementById('timerDisplay');
    import * as THREE from 'three';
	import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

	window.algorithmicExtend = function() {
		if (!PARAMS.segments || PARAMS.segments.length === 0) {
			alert("A tanuláshoz szükség van legalább egy meglévő szakaszra!");
			return;
		}

		const count = parseInt(document.getElementById('extendCount').value) || 3;
		const position = document.getElementById('extendPosition').value || 'end';
		const src = PARAMS.segments;

		// 1. Statisztikai elemzés (Átlagértékek kiszámítása)
		const straights = src.filter(s => s.type === 'straight');
		const turns = src.filter(s => s.type === 'turn');

		const avgLen = straights.length > 0 ? straights.reduce((acc, s) => acc + s.len, 0) / straights.length : 6;
		const avgRadius = turns.length > 0 ? turns.reduce((acc, s) => acc + s.radius, 0) / turns.length : 4;
		const avgAngle = turns.length > 0 ? turns.reduce((acc, s) => acc + s.angle, 0) / turns.length : 90;
		const avgSlope = src.reduce((acc, s) => acc + (s.slope || 0.055), 0) / src.length;
		const avgDiameter = src.reduce((acc, s) => acc + (s.diameter || 2.0), 0) / src.length;

		const colors = src.map(s => s.color || '#ffcc00');
		const innerColors = src.map(s => s.innerColor || '#000000');
		const lights = src.map(s => s.light || 'rings');
		const shapes = src.map(s => s.shape || 'circle');

		// 2. Szimulált útvonal-követő az indítótorony (0,0) ütközéseinek elkerülésére
		let simX = 0, simZ = 0, simYaw = -Math.PI / 2;
		src.forEach(s => {
			if (s.type === 'straight') {
				const l = s.len || 5;
				simX += Math.cos(simYaw) * l;
				simZ += Math.sin(simYaw) * l;
			} else if (s.type === 'turn') {
				const r = s.radius || 4;
				const aRad = (s.angle || 90) * Math.PI / 180;
				const isLeft = (s.dir === 'left');
				const sweep = isLeft ? -aRad : aRad;
				const centerAngle = simYaw + (isLeft ? -Math.PI/2 : Math.PI/2);
				const centerX = simX + Math.cos(centerAngle) * r;
				const centerZ = simZ + Math.sin(centerAngle) * r;
				const startAngle = Math.atan2(simZ - centerZ, simX - centerX);
				simX = centerX + Math.cos(startAngle + sweep) * r;
				simZ = centerZ + Math.sin(startAngle + sweep) * r;
				simYaw += sweep;
			}
		});

		// 3. Markov-lánc mátrixok felállítása sorrendiség tanulásához
		const transitions = {
			type: {},
			light: {},
			shape: {},
			dir: {}
		};

		for (let i = 0; i < src.length - 1; i++) {
			const curr = src[i];
			const next = src[i+1];

			if (!transitions.type[curr.type]) transitions.type[curr.type] = [];
			transitions.type[curr.type].push(next.type);

			if (!transitions.light[curr.light]) transitions.light[curr.light] = [];
			transitions.light[curr.light].push(next.light);

			if (!transitions.shape[curr.shape]) transitions.shape[curr.shape] = [];
			transitions.shape[curr.shape].push(next.shape);

			if (curr.type === 'turn' && next.type === 'turn') {
				if (!transitions.dir[curr.dir]) transitions.dir[curr.dir] = [];
				transitions.dir[curr.dir].push(next.dir);
			}
		}

		const getRandom = (arr, fallback) => {
			if (!arr || arr.length === 0) return fallback;
			return arr[Math.floor(Math.random() * arr.length)];
		};

		const mutate = (val, range = 0.15) => {
			return val * (1 + (Math.random() - 0.5) * range);
		};

		// Összeférhetőségi szabályok a fényekhez szegmenstípus alapján
		const straightOnlyLights = ['strips', 'center_tris', 'water_curtain', 'text'];
		const turnOnlyLights = ['turn_circles', 'turn_droplets'];

		const getValidLight = (type, predictedLight) => {
			if (type === 'straight' && turnOnlyLights.includes(predictedLight)) {
				const ok = lights.filter(l => !turnOnlyLights.includes(l));
				return ok.length > 0 ? getRandom(ok, 'rings') : 'rings';
			}
			if (type === 'turn' && straightOnlyLights.includes(predictedLight)) {
				const ok = lights.filter(l => !straightOnlyLights.includes(l));
				return ok.length > 0 ? getRandom(ok, 'rings') : 'rings';
			}
			return predictedLight;
		};

		// 4. Predikciós ciklus futtatása biztonsági ellenőrzésekkel
		const generated = [];
		let currentRef = position === 'end' ? src[src.length - 1] : src[0];

		for (let g = 0; g < count; g++) {
			let nextType = getRandom(transitions.type[currentRef.type], getRandom(src.map(s => s.type), 'straight'));
			
			// Szabály 3: Ha a pálya végére extendelünk, a legutolsó elemnek kötelezően egyenesnek kell lennie
			if (position === 'end' && g === count - 1) {
				nextType = 'straight';
			}

			// Szabály 2: Ütközéselkerülés szimulációja az indítótoronnyal (0,0)
			if (nextType === 'turn') {
				const tempRadius = Math.max(2, Math.round(mutate(turns.length > 0 ? getRandom(turns.map(s => s.radius), avgRadius) : avgRadius, 0.1) * 10) / 10);
				const tempAngleRad = Math.max(15, Math.min(180, Math.round(mutate(turns.length > 0 ? getRandom(turns.map(s => s.angle), avgAngle) : avgAngle, 0.15) / 15) * 15)) * Math.PI / 180;
				const tempDir = getRandom(transitions.dir[currentRef.dir], currentRef.dir === 'left' ? 'right' : 'left');
				
				const sweep = (tempDir === 'left') ? -tempAngleRad : tempAngleRad;
				const centerAngle = simYaw + (tempDir === 'left' ? -Math.PI/2 : Math.PI/2);
				const centerX = simX + Math.cos(centerAngle) * tempRadius;
				const centerZ = simZ + Math.sin(centerAngle) * tempRadius;
				const startAngle = Math.atan2(simZ - centerZ, simX - centerX);
				const endAngle = startAngle + sweep;
				
				const testX = centerX + Math.cos(endAngle) * tempRadius;
				const testZ = centerZ + Math.sin(endAngle) * tempRadius;

				// Ha a kanyar visszavinné a csúszdát a torony 7 méteres körzetébe, helyette egyenest építünk
				if (Math.sqrt(testX * testX + testZ * testZ) < 7.0) {
					nextType = 'straight';
				}
			}

			// Szabály 1: Fény összeférhetőség ellenőrzése
			const rawLight = getRandom(transitions.light[currentRef.light], getRandom(lights, 'rings'));
			const nextLight = getValidLight(nextType, rawLight);

			const nextShape = getRandom(transitions.shape[currentRef.shape], getRandom(shapes, 'circle'));
			const nextColor = getRandom(colors, '#ffcc00');
			const nextInnerColor = getRandom(innerColors, '#000000');
			const nextSlope = Math.max(0.01, Math.min(0.2, mutate(currentRef.slope || avgSlope, 0.1)));
			const nextDiameter = Math.max(1.0, Math.min(4.0, mutate(currentRef.diameter || avgDiameter, 0.05)));

			const newSeg = {
				type: nextType,
				light: nextLight,
				shape: nextShape,
				color: nextColor,
				innerColor: nextInnerColor,
				slope: nextSlope,
				diameter: nextDiameter,
				lanes: currentRef.lanes || 3,
				starsScale: currentRef.starsScale || 1.0,
				textValue: currentRef.textValue || 'BLACK HOLE'
			};

			if (nextType === 'straight') {
				const baseLen = straights.length > 0 ? getRandom(straights.map(s => s.len), avgLen) : avgLen;
				newSeg.len = Math.max(1, Math.round(mutate(baseLen, 0.20) * 10) / 10);
				
				// Szimulált koordináta frissítése egyeneshez
				simX += Math.cos(simYaw) * newSeg.len;
				simZ += Math.sin(simYaw) * newSeg.len;
			} else {
				const baseRadius = turns.length > 0 ? getRandom(turns.map(s => s.radius), avgRadius) : avgRadius;
				const baseAngle = turns.length > 0 ? getRandom(turns.map(s => s.angle), avgAngle) : avgAngle;
				
				newSeg.radius = Math.max(2, Math.round(mutate(baseRadius, 0.10) * 10) / 10);
				newSeg.angle = Math.max(15, Math.min(180, Math.round(mutate(baseAngle, 0.15) / 15) * 15)); 
				newSeg.dir = getRandom(transitions.dir[currentRef.dir], currentRef.dir === 'left' ? 'right' : 'left');

				// Szimulált koordináta frissítése kanyarhoz
				const aRad = newSeg.angle * Math.PI / 180;
				const sweep = (newSeg.dir === 'left') ? -aRad : aRad;
				const centerAngle = simYaw + (newSeg.dir === 'left' ? -Math.PI/2 : Math.PI/2);
				const centerX = simX + Math.cos(centerAngle) * newSeg.radius;
				const centerZ = simZ + Math.sin(centerAngle) * newSeg.radius;
				const startAngle = Math.atan2(simZ - centerZ, simX - centerX);
				
				simX = centerX + Math.cos(startAngle + sweep) * newSeg.radius;
				simZ = centerZ + Math.sin(startAngle + sweep) * newSeg.radius;
				simYaw += sweep;
			}

			generated.push(newSeg);
			currentRef = newSeg;
		}

		// 5. Beillesztés a megfelelő helyre
		if (position === 'start') {
			PARAMS.segments.unshift(...generated);
		} else {
			PARAMS.segments.push(...generated);
		}

		renderUI();
		rebuildSlide();
	};
	

	let isExternal = false;
	let controls;
	const diameters = [1.4, 2];
	
	window.toggleLightBleed = function(val) {
		PARAMS.allowLightBleed = val;
		rebuildSlide();
	};
    
	let PARAMS = {
		allowLightBleed: true, 
		segments: [
			{ type: 'straight', len: 6, light: 'strips', diameter: 2.0, slope: 0.06, shape: 'circle', color: '#ff7700', innerColor: '#000000' },
			{ type: 'turn', radius: 5, angle: 90, dir: 'left', light: 'rings', diameter: 2.0, slope: 0.06, shape: 'circle', color: '#ff7700', innerColor: '#000000' },
			{ type: 'straight', len: 6, light: 'dark', diameter: 2.0, slope: 0.06, shape: 'open', color: '#ff7700', innerColor: '#000000' },
			{ type: 'turn', radius: 6, angle: 120, dir: 'right', light: 'daylight_dots', diameter: 2.0, slope: 0.06, shape: 'circle', color: '#ff7700', innerColor: '#000000', lanes: 3 }
		]
	};
	
	function bendGeometryToSlide(baseGeo, d, baseAngle, offsetDist) {
		const geo = baseGeo.clone();
		const posAttr = geo.attributes.position;
		
		// Helyi bázis lekérése egyetlen pontban (d), hogy elkerüljük a hosszanti csavarodást
		const clampedDist = Math.max(0, Math.min(totalLen, d));
		const t = clampedDist / totalLen;
		const pos = mainPath.getPointAt(t);
		const T = mainPath.getTangentAt(t).normalize();

		const worldUp = new THREE.Vector3(0, 1, 0);
		let B = new THREE.Vector3().crossVectors(T, worldUp).normalize();
		if (B.lengthSq() < 0.0001) {
			const altUp = new THREE.Vector3(0, 0, 1);
			B = new THREE.Vector3().crossVectors(T, altUp).normalize();
		}
		const N = new THREE.Vector3().crossVectors(B, T).normalize();

		let props = getSlideProps(clampedDist);
		const r = (props.diameter / 2) - offsetDist;

		for (let i = 0; i < posAttr.count; i++) {
			const lx = posAttr.getX(i);
			const ly = posAttr.getY(i);
			
			// Szög kiszámítása a cső ívén
			const angle = baseAngle - (ly / (props.diameter / 2));
			
			// Keresztmetszet pontok lekérése a dinamikus formához
			let p1 = getShapeXY(props.shape1, r, angle, props.lanes1);
			let p2 = getShapeXY(props.shape2, r, angle, props.lanes2);
			let ox = p1.x * (1 - props.t) + p2.x * props.t;
			let oy = p1.y * (1 - props.t) + p2.y * props.t;

			// Pont kiszámítása a helyi T, B, N vektorok alapján (tökéletes koncentrikus illeszkedés)
			const bentPos = pos.clone()
				.add(B.clone().multiplyScalar(ox))
				.add(N.clone().multiplyScalar(oy))
				.add(T.clone().multiplyScalar(lx));

			posAttr.setXYZ(i, bentPos.x, bentPos.y, bentPos.z);
		}
		geo.computeVertexNormals();
		return geo;
	}
	
	function updateEnvironmentColor() {
        const now = new Date();
        const mode = document.getElementById('timeMode') ? document.getElementById('timeMode').value : 'real';
        
        let currentHour;
        if (mode === 'real') {
            currentHour = now.getHours() + now.getMinutes() / 60;
        } else {
            const h = parseFloat(document.getElementById('fixedHour').value) || 12;
            const m = parseFloat(document.getElementById('fixedMinute').value) || 0;
            currentHour = h + m / 60;
        }

        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
        const daysFromWinterSolstice = (dayOfYear + 10) % 365;
        const swing = -Math.cos((daysFromWinterSolstice / 365) * Math.PI * 2); 
        const sunrise = 6.125 - swing * 1.375; 
        const sunset = 18.375 + swing * 2.375; 
        
        let intensity = 0;
        let skyColor = new THREE.Color(0x050515);

        if (currentHour > sunrise && currentHour < sunset) {
            const dayProgress = (currentHour - sunrise) / (sunset - sunrise);
            intensity = Math.sin(dayProgress * Math.PI);
            
            // Égbolt átmenet: Napkelte (Narancs) -> Nappal (Kék) -> Napnyugta (Narancs)
            const dayBlue = new THREE.Color(0x87CEEB);
            const sunOrange = new THREE.Color(0xFF7F50);
            skyColor.copy(sunOrange).lerp(dayBlue, intensity);
        } else if (currentHour > sunrise - 1 && currentHour <= sunrise) {
            // Pirkadat
            skyColor.setHex(0x050515).lerp(new THREE.Color(0xFF7F50), currentHour - (sunrise - 1));
        } else if (currentHour >= sunset && currentHour < sunset + 1) {
            // Alkonyat
            skyColor.setHex(0xFF7F50).lerp(new THREE.Color(0x050515), currentHour - sunset);
        }

        scene.background = skyColor;

        const r = Math.floor(255 * intensity);
        const g = Math.floor(127 * intensity);
        const b = 0;
        
		globalSunIntensity = intensity;
        
        const dl = Math.floor(255 * intensity);
        daylightMat.color.setHex((dl << 16) | (dl << 8) | dl);
		
		// Ha a fényáteresztés ki van kapcsolva, a beszűrődő fényeket feketére állítjuk
		if (PARAMS.allowLightBleed !== false) {
			orangeColor = (r << 16) | (g << 8) | b;
			const faintR = Math.floor(r * 0.25);
			const faintG = Math.floor(g * 0.25);
			faintOrangeMat.color.setHex((faintR << 16) | (faintG << 8) | b);
		} else {
			orangeColor = 0x000000;
			faintOrangeMat.color.setHex(0x000000);
		}
		
        orangeMat.color.setHex(orangeColor);
        orangeBaseMat.color.setHex(orangeColor);
        floorBgMat.color.setHex(orangeColor);
		
        const faintR = Math.floor(r * 0.25);
        const faintG = Math.floor(g * 0.25);
        faintOrangeMat.color.setHex((faintR << 16) | (faintG << 8) | b);
		
		if (typeof ambientLight !== 'undefined' && typeof sunLight !== 'undefined') {
            ambientLight.intensity = Math.max(0.05, intensity * 0.4);
            sunLight.intensity = Math.max(0.0, intensity * 1.5);
            
            // A nap útja az égen: 6:00-kor kel (0 fok), 18:00-kor nyugszik (180 fok)
            let sunAngle = ((currentHour - 6) / 12) * Math.PI; 
            
            // X tengelyen kel-nyugszik, Y a magassága, Z-ből kicsit megdöntjük
            let sunY = Math.sin(sunAngle) * 200;

	function playComplexRumble() {
		if (audioCtx.state === 'suspended') audioCtx.resume();
		const duration = 4.5;
		const now = audioCtx.currentTime;
		const masterGain = audioCtx.createGain();
		
		
		[32, 45, 55, 62].forEach((freq, i) => {
			const osc = audioCtx.createOscillator();
			const g = audioCtx.createGain();
			osc.type = i % 2 === 0 ? 'sine' : 'triangle';
			osc.frequency.setValueAtTime(freq, now);
			osc.frequency.exponentialRampToValueAtTime(freq * 0.8, now + duration);
			
			
			g.gain.setValueAtTime(0, now);
			g.gain.linearRampToValueAtTime(0.2, now + 0.5 + i*0.2);
			g.gain.linearRampToValueAtTime(0, now + duration);
			
			osc.connect(g);
			g.connect(masterGain);
			osc.start(); osc.stop(now + duration);
		});

		
		const bufferSize = audioCtx.sampleRate * duration;
		const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
		const data = buffer.getChannelData(0);
		for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
		
		const noise = audioCtx.createBufferSource();
		const noiseFilter = audioCtx.createBiquadFilter();
		const noiseGain = audioCtx.createGain();
		
		noise.buffer = buffer;
		noiseFilter.type = 'lowpass';
		noiseFilter.frequency.setValueAtTime(400, now);
		noiseFilter.frequency.exponentialRampToValueAtTime(40, now + duration);
		
		noiseGain.gain.setValueAtTime(0, now);
		noiseGain.gain.linearRampToValueAtTime(0.1, now + 0.2);
		noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
		
		noise.connect(noiseFilter);
		noiseFilter.connect(noiseGain);
		noiseGain.connect(masterGain);
		noise.start();

		masterGain.connect(audioCtx.destination);
	}

	function getSlideProps(dist) {
        if (!PARAMS.segments || PARAMS.segments.length === 0) 
            return { diameter: 2, slope: 0.05, shape1: 'circle', shape2: 'circle', lanes1: 1, lanes2: 1, t: 0, color: '#ffcc00', prevInner: '#000000', currInner: '#000000', prevInt: 0, currInt: 0, isOpen: false };
        
        let cur = 0;
        for (let i = 0; i < PARAMS.segments.length; i++) {
            let seg = PARAMS.segments[i];
            let slen;
            if (seg.type === 'straight') {
                slen = seg.len || 0.1;
            } else if (seg.type === 'space_bowl') {
                const bowlD = parseFloat(seg.bowlDiameter) || 8.0;
                const rotations = parseFloat(seg.rotations) || 2.0;
                const R_tube = (seg.diameter || 2.0) / 2;
                const R_start = (bowlD / 2) - R_tube * 1.50; // További 15 cm-rel beljebb toljuk a csövet
                const R_exit = 0.0;
                const avgR = (R_start + R_exit) / 2;
                const sweep = Math.PI * 1 * rotations;
                const spiralLen = avgR * sweep;
                const dropLen = 0.1; // Minimális zuhanásmentes kivezető magasság (10 cm)
                slen = spiralLen + dropLen;
            } else {
                slen = (parseFloat(seg.radius) || 0.1) * Math.abs(parseFloat(seg.angle) || 90) * Math.PI / 180;
            }
            
            if (dist <= cur + slen + 0.0001 || i === PARAMS.segments.length - 1) {
                let prev = i > 0 ? PARAMS.segments[i-1] : seg;
                let t = slen <= 0 ? 0 : Math.max(0, Math.min(1, (dist - cur) / slen));
                
                // --- ÚJ: Megvizsgáljuk, hogy ez egy "Többpályás <-> Egypályás" találkozás-e ---
                let isMultiTrans = (prev.shape === 'multi' && seg.shape !== 'multi') || (prev.shape !== 'multi' && seg.shape === 'multi');
                
                // Ha többpályásra/ról váltunk, azonnal "100%"-ra ugrik az átmenet, azaz nincs lágy morfolódás.
                let finalT = isMultiTrans ? 1 : t;
                let shape1 = isMultiTrans ? seg.shape : (prev.shape || 'circle');
                let lanes1 = isMultiTrans ? seg.lanes : (prev.lanes || 1);

                return {
                    diameter: (prev.diameter || 2.0) * (1 - finalT) + (seg.diameter || 2.0) * finalT,
                    slope: (prev.slope || 0.06) * (1 - finalT) + (seg.slope || 0.06) * finalT,
                    shape1: shape1,
                    shape2: seg.shape || 'circle',
                    lanes1: lanes1,
                    lanes2: seg.lanes || 1,
                    t: finalT,
                    color: seg.color || '#ffcc00',
                    prevInner: prev.innerColor || '#000000',
                    currInner: seg.innerColor || '#000000',
                    prevInt: getLightIntensity(prev.light),
                    currInt: getLightIntensity(seg.light),
                    isOpen: seg.shape === 'open' || seg.shape === 'multi'
                };
            }
            cur += slen;
        }
        
        const last = PARAMS.segments[PARAMS.segments.length - 1];
        return { 
            diameter: last.diameter, slope: last.slope, shape1: last.shape, shape2: last.shape, 
            lanes1: last.lanes || 1, lanes2: last.lanes || 1,
            t: 1, color: last.color, 
            prevInner: last.innerColor || '#000000', currInner: last.innerColor || '#000000',
            prevInt: getLightIntensity(last.light), currInt: getLightIntensity(last.light),
            isOpen: last.shape === 'open' || last.shape === 'multi'
        };
    }

	function getShapeXY(shape, r, angle, lanes = 1) {
		let x = Math.cos(angle) * r;
		let y = Math.sin(angle) * r;

		if (shape === 'oval') {
			const height = r * 2;
			const width = height / 0.666;
			x = Math.cos(angle) * (width / 2);
			y = Math.sin(angle) * (height / 2);
			const flatZone = 0.3; 
			if (x > -flatZone && x < flatZone) {
				if (y > 0) y = height / 2; 
				else y = -height / 2; 
			}
		} else if (shape === 'half') {
			let R = r * 2; 
			x = Math.cos(angle) * R;
			y = Math.sin(angle) * R;
			if (y < 0) y = 0; 
			y -= r; 
		} else if (shape === 'multi') {
			// U: 0 (bal szél) -> 1 (jobb szél)
			let u = (x + r) / (2 * r);
			u = Math.max(0, Math.min(1, u)); 
			
			let laneU = (u * lanes) % 1; 
			let localX = (laneU - 0.5) * 2; 

			let baseFlatY = -r * 0.7; // A csúszda alap mélysége
			
			// Külső falak azonosítása (bal szélső sáv bal fele, jobb szélső sáv jobb fele)
			let isLeftWall = (u <= 0.5 / lanes) && localX < 0; 
			let isRightWall = (u >= 1.0 - (0.5 / lanes)) && localX > 0;
			
			// A külső falak kicsit magasabbak, mint a belső elválasztók
			let targetHeight = (isLeftWall || isRightWall) ? (r * 0.85) : (r * 0.65);
			
			let wallFactor = Math.pow(Math.abs(localX), 8); 
			let dip = (1 - Math.pow(Math.abs(localX), 2)) * (r * 0.06);

			// A végső magasság egyből alkalmazva a teljes formára
			y = baseFlatY + (wallFactor * targetHeight) - dip;
		}
		return { x, y };
	}

	function getPointOnSlide(dist, localAngle, offsetFromWall = 0.01, segIdxHint = -1) {
		if (!mainPath) return new THREE.Vector3();
		const clampedDist = Math.max(0, Math.min(totalLen, dist));
		const t = clampedDist / totalLen;
		const pos = mainPath.getPointAt(t);
		const T = mainPath.getTangentAt(t).normalize();

		const worldUp = new THREE.Vector3(0, 1, 0);
		let B = new THREE.Vector3().crossVectors(T, worldUp).normalize();
		if (B.lengthSq() < 0.0001) {
			// Ha a cső függőleges (zuhanás), alternatív referencia-vektort használunk
			const altUp = new THREE.Vector3(0, 0, 1);
			B = new THREE.Vector3().crossVectors(T, altUp).normalize();
		}
		const N = new THREE.Vector3().crossVectors(B, T).normalize();

        // Itt átadjuk a tippet, hogy pontosan vágja el a határokat
        let props = getSlideProps(clampedDist, segIdxHint);
		const r = (props.diameter / 2) - offsetFromWall;

		let p1 = getShapeXY(props.shape1, r, localAngle, props.lanes1);
        let p2 = getShapeXY(props.shape2, r, localAngle, props.lanes2);
        
        let ox = p1.x * (1 - props.t) + p2.x * props.t;
        let oy = p1.y * (1 - props.t) + p2.y * props.t;

		return pos.clone().add(B.clone().multiplyScalar(ox)).add(N.clone().multiplyScalar(oy));
	}

	window.updateSeg = function(i, prop, val) {
        PARAMS.segments[i][prop] = val;
        
        if (prop === 'type' && val === 'space_bowl') {
            if (!PARAMS.segments[i].bowlDiameter) PARAMS.segments[i].bowlDiameter = 8.0;
            if (!PARAMS.segments[i].bowlStyle) PARAMS.segments[i].bowlStyle = 'open';
            if (!PARAMS.segments[i].rotations) PARAMS.segments[i].rotations = 2.0;
            if (!PARAMS.segments[i].exitDrop) PARAMS.segments[i].exitDrop = 2.5;
            if (!PARAMS.segments[i].dir) PARAMS.segments[i].dir = 'left';
        }
        
        if (prop === 'shape' && val === 'multi' && !PARAMS.segments[i].lanes) {
            PARAMS.segments[i].lanes = 3;
        }
        
        if (prop === 'type' && val === 'turn') { 
            PARAMS.segments[i].radius = 4; 
            PARAMS.segments[i].angle = 90; 
            PARAMS.segments[i].dir = 'left'; 
        }
        if (!PARAMS.segments[i].light) PARAMS.segments[i].light = 'rings';
        renderUI();
    };
	
	function addStartAndEndElements() {
		const startPos = mainPath.getPointAt(0);
		const endPos = mainPath.getPointAt(1);
		const endTangent = mainPath.getTangentAt(1).normalize();

		const flatEndDir = endTangent.clone();
		flatEndDir.y = 0; 
		flatEndDir.normalize();

		const lastProps = getSlideProps(totalLen);
		const runoutColor = document.getElementById('runoutColor') ? document.getElementById('runoutColor').value : '#0088ff';
		const rMat = new THREE.MeshPhongMaterial({ color: runoutColor, side: THREE.DoubleSide });

		const w = lastProps.diameter;
		const R = w / 2;
		
		// Lekérdezzük az utolsó elem pontos keresztmetszet-típusát és peremmagasságát (bal szélső pont y koordinátája)
		const shapeType = lastProps.shape2;
		const edgeCoord = getShapeXY(shapeType, R, -Math.PI);
		const topY = edgeCoord.y;         // A csúszda peremének pontos magassága (pl. körnél 0, félkörnél -R)

		const totalRunoutLen = 8;     
		const transLen = 1.5;             // Az átmeneti szakasz hossza
		const mainLen = totalRunoutLen - transLen; // A tiszta szögletes szakasz hossza
		const thickness = 0.1;

		const endGroup = new THREE.Group();

		// ==========================================
		// 1. DINAMIKUS ÁTMENETI IDOM (LOFT)
		// ==========================================
		const stepsZ = 15;
		const stepsS = 30;
		const transGeo = new THREE.BufferGeometry();
		const verts = [];
		const indices = [];
		const uvs = [];

		for (let i = 0; i <= stepsZ; i++) {
			const weight = i / stepsZ; // 0.0 (csőnél) -> 1.0 (vályúnál)
			const z = weight * transLen;

			for (let j = 0; j <= stepsS; j++) {
				const s = j / stepsS;
				const alpha = -Math.PI + s * Math.PI; // -PI-től 0-ig (alsó ív)

				// Csúszda végének PONTOS koordinátái (alkalmazkodik a kör/félkör/ovális formához)
				const coord = getShapeXY(shapeType, R, alpha, lastProps.lanes2);
				const x_circ = coord.x;
				const y_circ = coord.y;

				// Vályú pontjai (a pereme pontosan a csúszda peremének topY magasságához igazodik)
				let x_rect, y_rect;
				if (s < 0.25) { // Bal oldali függőleges fal
					x_rect = -R;
					y_rect = topY - (s / 0.25) * (topY + R);
				} else if (s <= 0.75) { // Lapos aljzat
					x_rect = -R + ((s - 0.25) / 0.5) * (2 * R);
					y_rect = -R;
				} else { // Jobb oldali függőleges fal
					x_rect = R;
					y_rect = -R + ((s - 0.75) / 0.25) * (topY + R);
				}

				// Sima lineáris interpoláció a valódi csúszdaforma és a szögletes vályú között
				const x = (1 - weight) * x_circ + weight * x_rect;
				const y = (1 - weight) * y_circ + weight * y_rect;

				verts.push(x, y, z);
				uvs.push(s, weight);
			}
		}

		// Indexek generálása
		for (let i = 0; i < stepsZ; i++) {
			for (let j = 0; j < stepsS; j++) {
				const row1 = i * (stepsS + 1);
				const row2 = (i + 1) * (stepsS + 1);

				const a = row1 + j;
				const b = row2 + j;
				const c = row1 + j + 1;
				const d = row2 + j + 1;

				indices.push(a, b, c);
				indices.push(b, d, c);
			}
		}

		transGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
		transGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
		transGeo.setIndex(indices);
		transGeo.computeVertexNormals();

		const transitionMesh = new THREE.Mesh(transGeo, rMat);
		endGroup.add(transitionMesh);

		// ==========================================
		// 2. TISZTA SZÖGLETES VÁLYÚ (Dinamikus falmagassággal)
		// ==========================================
		const h_wall = topY + R; // A fal magassága alkalmazkodik a perem magasságához

		const bottomBox = new THREE.Mesh(new THREE.BoxGeometry(w, thickness, mainLen), rMat);
		bottomBox.position.set(0, -R, transLen + mainLen/2);
		
		const leftBox = new THREE.Mesh(new THREE.BoxGeometry(thickness, h_wall, mainLen), rMat);
		leftBox.position.set(-R + thickness/2, -R + h_wall/2, transLen + mainLen/2);
		
		const rightBox = new THREE.Mesh(new THREE.BoxGeometry(thickness, h_wall, mainLen), rMat);
		rightBox.position.set(R - thickness/2, -R + h_wall/2, transLen + mainLen/2);

		// BEFALAZOTT VÉG (Szintén igazítva a dinamikus magassághoz)
		const backWall = new THREE.Mesh(new THREE.BoxGeometry(w, h_wall, thickness), rMat);
		backWall.position.set(0, -R + h_wall/2, totalRunoutLen - thickness/2);

		endGroup.add(bottomBox, leftBox, rightBox, backWall);
		
		// Illesztés: 0.05 méter átfedéssel csatlakoztatjuk a csőhöz
		const transitionOffset = flatEndDir.clone().multiplyScalar(-0.75);
		endGroup.position.copy(endPos).add(transitionOffset);
		endGroup.lookAt(endPos.clone().add(flatEndDir));
		slideGroup.add(endGroup);

		const groundY = endPos.y - w/2;

		// Térkő alap
		const canvas = document.createElement('canvas');
		canvas.width = 256; canvas.height = 256;
		const ctx = canvas.getContext('2d');
		ctx.fillStyle = '#888888'; ctx.fillRect(0, 0, 256, 256);
		ctx.strokeStyle = '#555555'; ctx.lineWidth = 4;
		for(let i=0; i<=256; i+=64) {
			ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke();
			ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(256, i); ctx.stroke();
			if (i < 256) {
				ctx.beginPath(); ctx.moveTo(i+32, 32); ctx.lineTo(i+32, 256); ctx.stroke();
			}
		}
		const groundTex = new THREE.CanvasTexture(canvas);
		groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
		groundTex.repeat.set(150, 150);

		const groundMesh = new THREE.Mesh(
			new THREE.PlaneGeometry(800, 800),
			new THREE.MeshPhongMaterial({ map: groundTex, shininess: 5 })
		);
		groundMesh.receiveShadow = true;
		groundMesh.rotation.x = -Math.PI / 2;
		groundMesh.position.set(endPos.x, groundY - thickness, endPos.z);
		slideGroup.add(groundMesh);

		// INDÍTÓTORONY (A csúszda pereménél)
		const startTangent = mainPath.getTangentAt(0).normalize();
		const towerSize = w * 1.8;
		const towerHeight = (startPos.y + 2.5) - groundY;
		
		const towerOffset = startTangent.clone().negate().multiplyScalar(towerSize / 2);
		const towerPos = startPos.clone().add(towerOffset);

		const towerGeo = new THREE.BoxGeometry(towerSize, towerHeight, towerSize);
		
		// ÚJ: A 'wireframe: true' paraméter törölve lett, így a fal szilárd lesz (betonszürke)
		const towerMat = new THREE.MeshPhongMaterial({ color: 0x666666, shininess: 10 });
		const towerMesh = new THREE.Mesh(towerGeo, towerMat);
		
		towerMesh.position.set(towerPos.x, groundY + (towerHeight / 2), towerPos.z);
		towerMesh.castShadow = true; towerMesh.receiveShadow = true;
		slideGroup.add(towerMesh);
		
		transitionMesh.castShadow = true; transitionMesh.receiveShadow = true;
		bottomBox.castShadow = true; bottomBox.receiveShadow = true;
		leftBox.castShadow = true; leftBox.receiveShadow = true;
		rightBox.castShadow = true; rightBox.receiveShadow = true;
		backWall.castShadow = true; backWall.receiveShadow = true;
	}
	
	window.rebuildSlide = function() {
		if (PARAMS.segments.length > 0) window.SLIDE_RAD = PARAMS.segments[0].diameter / 2; 

		// Grafikus memória (GPU) explicit felszabadítása a memóriaszivárgások ellen
		slideGroup.traverse(child => {
			if (child.isMesh) {
				if (child.geometry) child.geometry.dispose();
				if (child.material) {
					if (Array.isArray(child.material)) {
						child.material.forEach(m => {
							if (m.map) m.map.dispose();
							m.dispose();
						});
					} else {
						if (child.material.map) child.material.map.dispose();
						child.material.dispose();
					}
				}
			}
		});

		scene.remove(slideGroup);
		slideGroup = new THREE.Group();
		
		allRings = []; 
		starPoints.length = 0; 
		floorLights.length = 0; 
		centerTriangles.length = 0; 
		allDisplays = []; 
		imageDisplays = []; 
		turnLeds.length = 0; 
		zigzagLeds.length = 0; 
		star2Points.length = 0; 
		stripLeds.length = 0; 
		bgPositions.length = 0; 
		bgIndices.length = 0; 
		bgIdxOffset = 0; 
		jumpscares = []; 
		waterCurtains = [];
		customTextureMaterials = []; 
		tunnelDisplays = []; 
		rgbRingLeds = []; 

		// Fehér pöttyök csoportjának kezelése és hozzáadása a slideGroup-hoz
		whiteDotsGroup.traverse(child => { if (child.geometry) child.geometry.dispose(); });
		whiteDotsGroup = new THREE.Group();
		slideGroup.add(whiteDotsGroup);

		mainPath = createSlidePath();
		totalLen = mainPath.getLength();
		if (totalLen <= 0) return;

		frames = mainPath.computeFrenetFrames(Math.max(200, Math.floor(totalLen * 15)), true);

		buildCustomTube();
		addStartAndEndElements();
		addDecorations();
		
		scene.add(slideGroup);
		progress = 0; 
		slideTime = 0; 
		timerRunning = false;
		if (timerDisplay) timerDisplay.innerText = "00:00.00";
		
		document.getElementById('lengthVal').innerText = totalLen.toFixed(2);
		let totalDrop = 0; 
		PARAMS.segments.forEach(s => {
			let l = s.type === 'straight' ? s.len : (s.radius * Math.abs(s.angle) * Math.PI / 180);
			totalDrop += l * (s.slope || 0.06);
		});
		document.getElementById('heightVal').innerText = totalDrop.toFixed(2);
	};

	function createSlidePath() {
		const path = new THREE.CurvePath();
		let currP = new THREE.Vector3(0, 0, 0);
		let currYaw = -Math.PI / 2; 
		let totalS = 0;
        let currY = 0; 

		PARAMS.segments.forEach(seg => {
            const slope = seg.slope !== undefined ? seg.slope : 0.055;
			if (seg.type === 'straight') {
				const length = seg.len || 0.1;
				const nextP = new THREE.Vector3(currP.x + Math.cos(currYaw) * length, 0, currP.z + Math.sin(currYaw) * length);
                const nextY = currY - length * slope;

				const p1 = currP.clone(); const p2 = nextP.clone();
				p1.y = currY; p2.y = nextY;

				path.add(new THREE.LineCurve3(p1, p2));
				currP.copy(nextP);
                currY = nextY;
				totalS += length;
			} 
			else if (seg.type === 'turn') {
				const radius = parseFloat(seg.radius) || 0.1;
				const angleDeg = parseFloat(seg.angle) || 0;
				const angleRad = (angleDeg * Math.PI) / 180;
				if (angleDeg === 0) return;

				const isLeft = (seg.dir === 'left');
				const sweep = isLeft ? -angleRad : angleRad;
				const centerAngle = currYaw + (isLeft ? -Math.PI/2 : Math.PI/2);
				const center = new THREE.Vector3(currP.x + Math.cos(centerAngle) * radius, 0, currP.z + Math.sin(centerAngle) * radius);
				const startAngle = Math.atan2(currP.z - center.z, currP.x - center.x);
				
                const curveLen = radius * angleRad;
                const nextY = currY - curveLen * slope;
				const steps = Math.ceil(angleDeg / 5) + 5;

				for (let i = 0; i < steps; i++) {
					const a1 = startAngle + (i / steps) * sweep;
					const a2 = startAngle + ((i + 1) / steps) * sweep;
                    const p1Y = currY + (nextY - currY) * (i / steps);
                    const p2Y = currY + (nextY - currY) * ((i + 1) / steps);

					const p1 = new THREE.Vector3(center.x + Math.cos(a1) * radius, p1Y, center.z + Math.sin(a1) * radius);
					const p2 = new THREE.Vector3(center.x + Math.cos(a2) * radius, p2Y, center.z + Math.sin(a2) * radius);
					path.add(new THREE.LineCurve3(p1, p2));
				}
				currYaw += sweep;
				const finalPoint = path.curves[path.curves.length - 1].v2;
				currP.set(finalPoint.x, 0, finalPoint.z);
                currY = nextY;
				totalS += curveLen;
			}
			else if (seg.type === 'space_bowl') {
				const bowlD = parseFloat(seg.bowlDiameter) || 8.0;
				const rotations = parseFloat(seg.rotations) || 2.0;
				const slope = seg.slope !== undefined ? seg.slope : 0.055;
				const isLeft = (seg.dir === 'left');
				
				const R_tube = (seg.diameter || 2.0) / 2;
				const R_start = (bowlD / 2) - R_tube * 1.1; // Beljebb hozzuk a spirál kezdetét
				const R_exit = 0.0; // Egészen a tál közepéig spirálozik
				
				const centerAngle = currYaw + (isLeft ? -Math.PI/2 : Math.PI/2);
				const avgR = (R_start + R_exit) / 2;
				const sweep = (isLeft ? -1 : 1) * Math.PI * 1 * rotations;
				const spiralLen = avgR * Math.abs(sweep);
				const spiralDrop = Math.max(R_tube + 0.5, spiralLen * slope);
				
				// A tál pontos középpontja (Y tengelyen a lefolyó magasságában)
				const center = new THREE.Vector3(
					currP.x + Math.cos(centerAngle) * R_start, 
					currY - spiralDrop, 
					currP.z + Math.sin(centerAngle) * R_start
				);
				
				const startAngle = Math.atan2(currP.z - center.z, currP.x - center.x);
				
				// Analitikus adatok elmentése a tökéletes illesztéshez az addDecorations-ben
				seg.computedCenter = center.clone();
				seg.computedStartAngle = startAngle;
				seg.computedSpiralDrop = spiralDrop;
				seg.computedRStart = R_start;
				seg.computedStartPos = new THREE.Vector3(currP.x, currY, currP.z);
				seg.computedStartTangent = new THREE.Vector3(Math.cos(currYaw), -slope, Math.sin(currYaw)).normalize();

				const spiralSteps = 100;
				let lastSpiralPoint = currP.clone();
				lastSpiralPoint.y = currY;

				const bowlHeight = Math.max(2.0, spiralDrop); // Visszaállítva a természetes, arányos tálmagasságra
				for (let i = 1; i <= spiralSteps; i++) {
					const f = i / spiralSteps;
					const a = startAngle + f * sweep;
					const r = R_start * (1 - f) + R_exit * f;
					
					const pY = currY * (1 - f) + (center.y) * f;
					
					const p = new THREE.Vector3(
						center.x + Math.cos(a) * r,
						pY,
						center.z + Math.sin(a) * r
					);
					path.add(new THREE.LineCurve3(lastSpiralPoint.clone(), p.clone()));
					lastSpiralPoint.copy(p);
				}
				
				// --- FÜGGŐLEGES ZUHANÁS (LEFOLYÓ) ---
				const dropLen = 0.1; // Sima zuhanásmentes közvetlen csatlakozás (10 cm-es átmenet)
				const dropEndP = lastSpiralPoint.clone();
				dropEndP.y -= dropLen;
				
				path.add(new THREE.LineCurve3(lastSpiralPoint.clone(), dropEndP.clone()));
				
				currP.copy(dropEndP);
				currP.y = 0; 
				currY = dropEndP.y;
				
				const lastSpiralYaw = startAngle + sweep + (isLeft ? -Math.PI/2 : Math.PI/2);
				currYaw = lastSpiralYaw;
				seg.computedExitTangent = new THREE.Vector3(0, -1, 0); // Függőlegesen esik ki
			}
		});
		return path;
	}

	function buildCustomTube() {
		let currentDist = 0;
		let lastTunnelSeed = null; // ÚJ: Állapotváltozó az egymást követő LED-szakaszok számmagjának mentéséhez

		PARAMS.segments.forEach((seg, segIdx) => {
			// Kiszámítjuk a pontos szakaszhosszat a típus alapján
			const segLen = (seg.type === 'straight') ? (seg.len || 0.1) : 
			               (seg.type === 'space_bowl') ? (
			                   (() => {
			                       const bowlD = parseFloat(seg.bowlDiameter) || 8.0;
			                       const rotations = parseFloat(seg.rotations) || 2.0;
			                       const R_tube = (seg.diameter || 2.0) / 2;
			                       const R_start = (bowlD / 2) - R_tube * 1.25; // Frissített sugár
			                       const avgR = R_start / 2;
			                       const sweep = Math.PI * 1 * rotations;
			                       const spiralLen = avgR * sweep;
			                       const dropLen = 0.1;
			                       return spiralLen + dropLen;
			                   })()
			               ) :
			               ((parseFloat(seg.radius) || 0.1) * (Math.abs(parseFloat(seg.angle)) * Math.PI / 180));
			const segEnd = currentDist + segLen;

			// --- 1. SPACE BOWL ESETÉN ÁTUGRÁS (Nem rajzolunk csövet a tál spirálján belül) ---
			if (seg.type === 'space_bowl') {
				currentDist = segEnd;
				lastTunnelSeed = null; // Reset
				return;
			}

			// --- 2. ÁLTALÁNOS CSŐ GENERÁLÁSA ---
			const radSegs = 120;
			const steps = Math.max(10, Math.floor(segLen * 15));

			const vertsOut = [], vertsIn = [], indicesOut = [], indicesIn = [], colorsOut = [], colorsIn = [], uvsIn = [];
			const cColor = new THREE.Color(seg.color || '#ffcc00');

			for (let i = 0; i <= steps; i++) {
				const t_seg = i / steps;
				const dist = currentDist + t_seg * segLen;
                
				const props = getSlideProps(dist, segIdx);

				const colPrev = new THREE.Color(props.prevInner);
				const colCurr = new THREE.Color(props.currInner);
				const tempInColor = colPrev.clone().lerp(colCurr, props.t);
				const intensity = props.prevInt * (1 - props.t) + props.currInt * props.t;
				tempInColor.multiplyScalar(Math.min(1.0, Math.max(0.0, intensity)));

				for (let j = 0; j <= radSegs; j++) {
					const a = (j / radSegs) * Math.PI * 2;
					const u = t_seg;
					const v = j / radSegs;
					uvsIn.push(u, v);
					
					const vOut = getPointOnSlide(dist, a, 0, segIdx);
					vertsOut.push(vOut.x, vOut.y, vOut.z);
					colorsOut.push(cColor.r, cColor.g, cColor.b);

					const vIn = getPointOnSlide(dist, a, 0.015, segIdx);
					vertsIn.push(vIn.x, vIn.y, vIn.z);

					if (props.isOpen) colorsIn.push(cColor.r, cColor.g, cColor.b); 
					else colorsIn.push(tempInColor.r, tempInColor.g, tempInColor.b); 
				}
			}

			for (let i = 0; i < steps; i++) {
				const dist = currentDist + (i + 0.5) / steps * segLen;
				const props = getSlideProps(dist, segIdx);
                
                let isMulti = props.shape1 === 'multi' || props.shape2 === 'multi';

				for (let j = 0; j < radSegs; j++) {
					const a = (j / radSegs) * Math.PI * 2;
					
					if (isMulti && a > 0.01 && a < Math.PI - 0.01) continue;
					else if (props.isOpen && !isMulti && a > Math.PI/4 && a < 3*Math.PI/4) continue;

					const row1 = i * (radSegs + 1);
					const row2 = (i + 1) * (radSegs + 1);
					const a_idx = row1 + j, b_idx = row2 + j, c_idx = row1 + (j + 1), d_idx = row2 + (j + 1);

					indicesOut.push(a_idx, b_idx, c_idx);
					indicesOut.push(b_idx, d_idx, c_idx);
					indicesIn.push(a_idx, c_idx, b_idx);
					indicesIn.push(b_idx, c_idx, d_idx);
				}
			}

			const geoOut = new THREE.BufferGeometry();
			geoOut.setAttribute('position', new THREE.Float32BufferAttribute(vertsOut, 3));
			geoOut.setAttribute('color', new THREE.Float32BufferAttribute(colorsOut, 3));
			geoOut.setIndex(indicesOut); 
			geoOut.computeVertexNormals();

			const geoIn = new THREE.BufferGeometry();
			geoIn.setAttribute('position', new THREE.Float32BufferAttribute(vertsIn, 3));
			geoIn.setAttribute('color', new THREE.Float32BufferAttribute(colorsIn, 3));
			geoIn.setAttribute('uv', new THREE.Float32BufferAttribute(uvsIn, 2));
			geoIn.setIndex(indicesIn); 
			geoIn.computeVertexNormals();

			const segmentMatOut = seg.shape === 'open' ? openSlideMatOut : new THREE.MeshPhongMaterial({ vertexColors: true, side: THREE.FrontSide, shininess: 40 });

			let segmentMatIn;
			if (seg.shape === 'open') {
				segmentMatIn = openSlideMatIn;
				lastTunnelSeed = null; // Megszakadt a LED folytonosság
			} else if (seg.light === 'custom_texture' && seg.customTextureBase64) {
				lastTunnelSeed = null; // Megszakadt a LED folytonosság
				const tex = new THREE.TextureLoader().load(seg.customTextureBase64);
				tex.wrapS = THREE.RepeatWrapping;
				tex.wrapT = THREE.RepeatWrapping;
				tex.colorSpace = THREE.SRGBColorSpace; 
				segmentMatIn = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff, side: THREE.FrontSide });
				segmentMatIn.userData = { alwaysGlow: seg.alwaysGlow };
				customTextureMaterials.push(segmentMatIn);
			} else if (seg.light === 'futuristic_tunnel') {
				// TORZULÁSMENTES DINAMIKUS FELBONTÁS
				const pxPerMeter = 150;
				const C = Math.PI * (seg.diameter || 2.0);
				const canvasW = Math.max(256, Math.round(segLen * pxPerMeter));
				const canvasH = Math.max(256, Math.round(C * pxPerMeter));
				
				const canvas = document.createElement('canvas');
				canvas.width = canvasW;
				canvas.height = canvasH;
				
				const ctx = canvas.getContext('2d');
				const tex = new THREE.CanvasTexture(canvas);
				tex.wrapS = THREE.RepeatWrapping;
				tex.wrapT = THREE.RepeatWrapping;
				tex.repeat.set(1, 1);
				
				segmentMatIn = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff, side: THREE.FrontSide });
				
				// Ha nincs korábbi aktív számmagunk (mert most kezdődik a láncolat), generálunk egyet
				if (lastTunnelSeed === null) {
					lastTunnelSeed = Math.random() * 800;
				}

				tunnelDisplays.push({
					canvas: canvas,
					ctx: ctx,
					texture: tex,
					width: canvasW,
					height: canvasH,
					seed: lastTunnelSeed, // Közös számmag kiosztása a szinkronizációhoz
					diameter: seg.diameter || 2.0,
					len: segLen
				});
			} else if (seg.light === 'strips') {
				// JAVÍTVA: A strips anyaga és textúrája a megfelelő helyen jön létre
				const pxPerMeter = 150;
				const C = Math.PI * (seg.diameter || 2.0);
				const canvasW = Math.max(256, Math.round(segLen * pxPerMeter));
				const canvasH = Math.max(256, Math.round(C * pxPerMeter));
				
				const canvas = document.createElement('canvas');
				canvas.width = canvasW;
				canvas.height = canvasH;
				
				const ctx = canvas.getContext('2d');
				const tex = new THREE.CanvasTexture(canvas);
				tex.wrapS = THREE.RepeatWrapping;
				tex.wrapT = THREE.RepeatWrapping;
				
				segmentMatIn = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff, side: THREE.FrontSide });
				
				if (lastTunnelSeed === null) {
					lastTunnelSeed = Math.random() * 800;
				}

				tunnelDisplays.push({
					canvas: canvas,
					ctx: ctx,
					texture: tex,
					width: canvasW,
					height: canvasH,
					seed: lastTunnelSeed,
					diameter: seg.diameter || 2.0,
					len: segLen,
					isStrips: true
				});
			} else if (seg.light === 'rgb_rings') {
				segmentMatIn = new THREE.MeshPhongMaterial({ 
					color: new THREE.Color(seg.innerColor || '#000000'), 
					shininess: 10, 
					side: THREE.FrontSide 
				});
				lastTunnelSeed = null;
			} else if (seg.light === 'tunnel_rings') {
				// JAVÍTVA: A cső geometriája és anyaga megegyezik a Full LED csőével (tökéletes 3D illeszkedés)
				const pxPerMeter = 150;
				const C = Math.PI * (seg.diameter || 2.0);
				const canvasW = Math.max(256, Math.round(segLen * pxPerMeter));
				const canvasH = Math.max(256, Math.round(C * pxPerMeter));
				
				const canvas = document.createElement('canvas');
				canvas.width = canvasW;
				canvas.height = canvasH;
				
				const ctx = canvas.getContext('2d');
				const tex = new THREE.CanvasTexture(canvas);
				tex.wrapS = THREE.RepeatWrapping;
				tex.wrapT = THREE.RepeatWrapping;
				tex.repeat.set(1, 1);
				
				segmentMatIn = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff, side: THREE.FrontSide });
				
				if (lastTunnelSeed === null) {
					lastTunnelSeed = Math.random() * 800;
				}

				tunnelDisplays.push({
					canvas: canvas,
					ctx: ctx,
					texture: tex,
					width: canvasW,
					height: canvasH,
					seed: lastTunnelSeed,
					diameter: seg.diameter || 2.0,
					len: segLen,
					isRingsOnly: true, // Maszkolási flag beállítása a gyűrűs nézethez
					innerColor: seg.innerColor || '#000000'
				});
			} else {
				lastTunnelSeed = null; // Megszakadt a LED folytonosság
				segmentMatIn = new THREE.MeshPhongMaterial({ vertexColors: true, side: THREE.FrontSide, shininess: 10 });
			}

			const meshOut = new THREE.Mesh(geoOut, segmentMatOut);
			const meshIn = new THREE.Mesh(geoIn, segmentMatIn);
			meshOut.castShadow = true; meshOut.receiveShadow = true;
			meshIn.castShadow = true; meshIn.receiveShadow = true;

			slideGroup.add(meshOut, meshIn);
			currentDist = segEnd;
		});
	}

    const bgPositions = [];
    const bgIndices = [];
    let bgIdxOffset = 0;

    const ledGeo = new THREE.SphereGeometry(0.012, 8, 8);
    const redMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    function createOrangeRing(dist) {
        const pattern = [1, 2, 2, 1, 2, 2, 1, 2, 2, 1, 2, 2, 1]; 
        const halfW = 0.01; 
        const tMinus = mainPath.getTangentAt(dist/totalLen).clone().multiplyScalar(-halfW);
        const tPlus = mainPath.getTangentAt(dist/totalLen).clone().multiplyScalar(halfW);
        const G_rad = 0.02 / (getSlideProps(dist).diameter/2); 
        const S_rad = (Math.PI - 13 * G_rad) / 21; 

        let currAngle = 0;
        for (let half = 0; half < 2; half++) { 
            for (let i = 0; i < pattern.length; i++) {
                const segRad = pattern[i] * S_rad;
                const steps = pattern[i] === 1 ? 2 : 4; 
                for (let s = 0; s < steps; s++) {
                    const a1 = currAngle + (s / steps) * segRad;
                    const a2 = currAngle + ((s + 1) / steps) * segRad;
                    
                    const p1 = getPointOnSlide(dist, a1, 0.020);
                    const p2 = getPointOnSlide(dist, a2, 0.020);
                    
                    const v1 = p1.clone().add(tMinus); const v2 = p2.clone().add(tMinus);
                    const v3 = p1.clone().add(tPlus); const v4 = p2.clone().add(tPlus);
                    
                    bgPositions.push(v1.x, v1.y, v1.z, v2.x, v2.y, v2.z, v3.x, v3.y, v3.z, v4.x, v4.y, v4.z);
                    bgIndices.push(bgIdxOffset, bgIdxOffset + 1, bgIdxOffset + 2, bgIdxOffset + 2, bgIdxOffset + 1, bgIdxOffset + 3);
                    bgIdxOffset += 4;
                }
                currAngle += segRad + G_rad;
            }
        }
    }

	function placeRing(dist) {
		if (dist > totalLen) return;
		const ledGroup = []; 
		createOrangeRing(dist); 
		for (let i = 0; i < 40; i++) {
			if (i % 5 === 4) continue; 
			const a = (i / 40) * Math.PI * 2;
			const led = new THREE.Mesh(ledGeo, redMat);
			
			led.position.copy(getPointOnSlide(dist, a, 0.025));
			slideGroup.add(led); 
			ledGroup.push(led);
		}
		allRings.push(ledGroup);
	}
	function addDecorations() {
		let currentDist = 0;
		const worldUp = new THREE.Vector3(0, 1, 0);

		PARAMS.segments.forEach((seg, segIdx) => {
			const segLen = (seg.type === 'straight') ? (seg.len || 0.1) :
			               (seg.type === 'space_bowl') ? (
			                   (() => {
			                       const bowlD = parseFloat(seg.bowlDiameter) || 8.0;
			                       const rotations = parseFloat(seg.rotations) || 2.0;
			                       const R_tube = (seg.diameter || 2.0) / 2;
			                       const R_start = (bowlD / 2) - R_tube;
			                       const avgR = R_start / 2;
			                       const sweep = Math.PI * 1 * rotations;
			                       const spiralLen = avgR * sweep;
			                       const dropLen = 0.1;
			                       return spiralLen + dropLen;
			                   })()
			               ) :
			               ((parseFloat(seg.radius) || 0.1) * (Math.abs(parseFloat(seg.angle)) * Math.PI / 180));
			const segEnd = currentDist + segLen;

            window.SLIDE_RAD = (seg.diameter || 2.0) / 2;

			// Csak a tiszta nyitott és többpályás szakaszokat ugorjuk át teljesen
            if ((seg.shape === 'open' || seg.shape === 'multi') && seg.type !== 'space_bowl') {
                currentDist = segEnd;
                return;
            }

			if (seg.light === 'rings') {
				for (let d = currentDist + 0.5; d < segEnd; d += OCTANT_LEN / 17) { placeRing(d); }
			} 
			else if (seg.light === 'stars') {
				const cellLength = 0.2; 
				const angleSpan = Math.PI; 
				
				const starsPerRing = Math.floor((angleSpan * window.SLIDE_RAD) / cellLength); 
				const angleStep = angleSpan / starsPerRing;
				const jitterAmount = 0.8;

				for (let d = currentDist; d < segEnd; d += cellLength) {
					for (let i = 0; i < starsPerRing; i++) {
						const dOffset = (Math.random() - 0.5) * cellLength * jitterAmount;
						const aOffset = (Math.random() - 0.5) * angleStep * jitterAmount;

						const finalD = Math.max(currentDist, Math.min(segEnd, d + dOffset));
						const finalAng = i * angleStep + aOffset;

						// 3D ívre hajlított narancssárga háttér négyzet
						const bentSquareGeo = bendGeometryToSlide(squareGeoPre, finalD, finalAng, 0.022);
						const square = new THREE.Mesh(bentSquareGeo, orangeMat);
						slideGroup.add(square);

						// 3D ívre hajlított belső piros LED pötty
						const bentDotGeo = bendGeometryToSlide(dotGeoPre, finalD, finalAng, 0.025);
						const redDot = new THREE.Mesh(bentDotGeo, redMatDot);
						redDot.userData = { rnd: Math.random() * 25 };
						starPoints.push(redDot); 
						slideGroup.add(redDot);
					}
				}
			}

			else if (seg.light === 'dots') {
				for (let d = currentDist + 0.5; d < segEnd; d += 1.0) {
					const centerPos = mainPath.getPointAt(d / totalLen);
					const finalPos = getPointOnSlide(d, Math.PI / 2, 0.022); 

					const bgDot = new THREE.Mesh(new THREE.CircleGeometry(0.06, 16), orangeMat);

				const rCurtain = (props.diameter / 2) - 0.015; // egy picit kisebb a belső héjnál, hogy ne lógjon ki
				
				for (let i = 0; i <= steps; i++) {
					const ang = (i / steps) * Math.PI * 2;
					const p1 = getShapeXY(props.shape1, rCurtain, ang);
					const p2 = getShapeXY(props.shape2, rCurtain, ang);
					const lx = p1.x * (1 - props.t) + p2.x * props.t;
					const ly = p1.y * (1 - props.t) + p2.y * props.t;
					
					if (i === 0) curtainShape.moveTo(lx, ly);
					else curtainShape.lineTo(lx, ly);
				}
				const geo = new THREE.ShapeGeometry(curtainShape);
				const posAttr = geo.attributes.position;
				const uvAttr = geo.attributes.uv;
				
				// Megkeressük a legtávolabbi pontot a középponttól a torzulásmentes skálázáshoz
				let maxDist = 0;
				for (let i = 0; i < posAttr.count; i++) {
					const x = posAttr.getX(i);
					const y = posAttr.getY(i);
					const dist = Math.sqrt(x * x + y * y);
					if (dist > maxDist) maxDist = dist;
				}
				if (maxDist === 0) maxDist = 1;

				// UV koordináták felülírása: a (0,0) pont pontosan a (0.5, 0.5) textúra-középpontra esik
				for (let i = 0; i < posAttr.count; i++) {
					const x = posAttr.getX(i);
					const y = posAttr.getY(i);
					
					const u = (x / (2 * maxDist)) + 0.5;
					const v = (y / (2 * maxDist)) + 0.5;
					
					uvAttr.setXY(i, u, v);
				}
				uvAttr.needsUpdate = true;

				const mesh = new THREE.Mesh(geo, mat);
				
				mesh.position.copy(pos);
				mesh.lookAt(pos.clone().sub(T)); 
				
				const imageUrls = [
					"https://threejs.org/examples/textures/brick_diffuse.jpg"
				];
				
				const loadedImages = [];
				imageUrls.forEach(url => {
					const img = new Image();
					img.crossOrigin = "Anonymous";
					img.src = url;
					loadedImages.push(img);
				});

				mesh.userData = { 
					canvas: canvas, ctx: ctx, texture: texture, 
					images: loadedImages,
					imgIdx: 0,
					lastSwitch: 0,
					waterY: 0 
				};

				waterCurtains.push(mesh);
				slideGroup.add(mesh);
				
				const R = props.diameter / 2;
				const extColor = seg.color || '#ffcc00';
				const extMat = new THREE.MeshPhongMaterial({ color: extColor, shininess: 40 });

				// 1. Szilárd vízfüggöny burkolat (cső tetejétől a keret tetejéig szilárd, pontos szélességgel)
				const archShape = new THREE.Shape();
				archShape.moveTo(-R, R + 0.3); // Bal felső sarok (pontosan a csúszda szélénél, 30 cm-rel a teteje felett)
				archShape.lineTo(R, R + 0.3);  // Jobb felső sarok
				archShape.lineTo(R, 0);        // Jobb szél a cső középvonalánál

				// Íves rész kirajzolása a cső külső palástja mentén (jobbról balra haladva)
				const arcSegments = 32;
				for (let i = 0; i <= arcSegments; i++) {
					const theta = (i / arcSegments) * Math.PI;
					const ax = R * Math.cos(theta);
					const ay = R * Math.sin(theta);
					archShape.lineTo(ax, ay);
				}
				archShape.lineTo(-R, R + 0.3); // Vissza a bal felső sarokba

				const extrudeSettings = { depth: 0.1, bevelEnabled: false };
				const archGeo = new THREE.ExtrudeGeometry(archShape, extrudeSettings);
				archGeo.translate(0, 0, -0.05); // Központosítás a Z-tengelyen (vastagság felezése)

				const archMesh = new THREE.Mesh(archGeo, extMat);
				archMesh.position.copy(pos);
				archMesh.lookAt(pos.clone().add(T));
				slideGroup.add(archMesh);

				// 2. Vetítő doboz (1 méterrel a vízfüggöny után)
				const dProj = d + 1.0;
				if (dProj <= totalLen) {
					const tProj = dProj / totalLen;
					const posProj = mainPath.getPointAt(tProj);
					const TProj = mainPath.getTangentAt(tProj).normalize();

					// 40 cm széles, 20 cm magas, 50 cm hosszú téglatest
					const projBox = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.5), extMat);
					projBox.position.copy(posProj);
					projBox.lookAt(posProj.clone().add(TProj));
					
					// Felemelés a cső külső ívére, belógás nélkül
					projBox.translateY(R + 0.09); 
					slideGroup.add(projBox);
				}
			}
			else if (seg.light === 'daylight_dots') {
				for (let d = currentDist + 0.6; d < segEnd; d += 1.2) {
					let rowOffset = (Math.floor(d * 10) % 2 === 0) ? 0 : (Math.PI / 6);
					for (let i = 0; i < 6; i++) {
						const ang = (i / 6) * Math.PI * 2 + rowOffset;
						const bentGeo = bendGeometryToSlide(daylightDotGeoBase, d, ang, 0.030);
						slideGroup.add(new THREE.Mesh(bentGeo, daylightMat));
					}
				}
			}
			else if (seg.light === 'daylight_stars') {
				for (let d = currentDist + 0.8; d < segEnd; d += 1.6) {
					let rowOffset = (Math.floor(d * 10) % 2 === 0) ? 0 : (Math.PI / 5);
					for (let i = 0; i < 5; i++) {
						const ang = (i / 5) * Math.PI * 2 + rowOffset;
						const bentGeo = bendGeometryToSlide(daylightStarGeoBase, d, ang, 0.030);
						slideGroup.add(new THREE.Mesh(bentGeo, daylightMat));
					}
				}
			}
			else if (seg.light === 'daylight_rings') {
				// Sűrűbb teljes 3D-s fehér fénygyűrűk (1.0m helyett 0.4 méterenként)
				for (let d = currentDist + 0.2; d < segEnd; d += 0.4) {
					const ringPoints = [];
					for (let i = 0; i <= 40; i++) {
						const ang = (i / 40) * Math.PI * 2;
						ringPoints.push(getPointOnSlide(d, ang, 0.026));
					}
					const ringCurve = new THREE.CatmullRomCurve3(ringPoints);
					const ringGeo = new THREE.TubeGeometry(ringCurve, 40, 0.015, 8, true);
					slideGroup.add(new THREE.Mesh(ringGeo, daylightMat));
				}
			}
			else if (seg.light === 'daylight_half_rings') {
				// Sűrűbb 3D-s fehér félgyűrűk csak a csúszda felső felén (1.0m helyett 0.4 méterenként)
				for (let d = currentDist + 0.2; d < segEnd; d += 0.4) {
					const ringPoints = [];
					for (let i = 0; i <= 20; i++) {
						const ang = (i / 20) * Math.PI;
						ringPoints.push(getPointOnSlide(d, ang, 0.026));
					}
					const ringCurve = new THREE.CatmullRomCurve3(ringPoints);
					const ringGeo = new THREE.TubeGeometry(ringCurve, 20, 0.015, 8, false);
					slideGroup.add(new THREE.Mesh(ringGeo, daylightMat));
				}
			}
			else if (seg.light === 'tunnel_rings') {
				const R = window.SLIDE_RAD;
				
				// Megkeressük az ehhez a szakaszhoz tartozó dinamikus alagút-textúrát
				const td = tunnelDisplays.find(t => t.segmentIdx === segIdx);
				if (td) {
					const ringMat = new THREE.MeshBasicMaterial({ map: td.texture, side: THREE.DoubleSide });
					
					// Nyolcadkörönként (kb. 3.0 m) pontosan 8 db gyűrű távolsága: 3.0 / 8 = 0.375 m
					const spacing = 3.0 / 8; 
					
					for (let d = currentDist + spacing / 2; d < segEnd; d += spacing) {
						// Hajszálvékony (3.5 cm széles), falba simuló körkörös LED kijelző sáv
						const ringGeo = new THREE.CylinderGeometry(R - 0.004, R - 0.004, 0.035, 64, 1, true);
						const ringMesh = new THREE.Mesh(ringGeo, ringMat);
						
						// Pozicionálás és orientáció a cső tangense mentén
						const t = d / totalLen;
						const fIdx = Math.min(Math.floor(t * (frames.normals.length - 1)), frames.normals.length - 1);
						ringMesh.position.copy(mainPath.getPointAt(t));
						ringMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), frames.tangents[fIdx]);
						ringMesh.rotateX(Math.PI / 2);
						
						slideGroup.add(ringMesh);
					}
				}
			}
			if (seg.type === 'space_bowl') {
				const bowlD = parseFloat(seg.bowlDiameter) || 8.0;
				const rotations = parseFloat(seg.rotations) || 2.0;
				const slope = seg.slope !== undefined ? seg.slope : 0.055;
				const isLeft = (seg.dir === 'left');
				const isClosed = (seg.bowlStyle === 'closed');
				
				const R_tube = (seg.diameter || 2.0) / 2;
				const R_start = seg.computedRStart || ((bowlD / 2) - R_tube * 1.25);
				
				const center = seg.computedCenter || new THREE.Vector3();
				const startAngle = seg.computedStartAngle || 0;
				const spiralDrop = seg.computedSpiralDrop || 0;
				
				const bowlHeight = Math.max(2.0, spiralDrop); 
				const points = [];
				const floorSegs = 30;
				
				const R_hole = 0.0; 
				
				for (let i = 0; i <= floorSegs; i++) {
					const f = i / floorSegs;
					const r = f * (bowlD / 2);
					const h = Math.pow(f, 2) * bowlHeight;
					points.push(new THREE.Vector2(r, h));
				}
				
				if (isClosed) {
					const roofSegs = 15;
					for (let i = 1; i <= roofSegs; i++) {
						const f = i / roofSegs;
						const r = (bowlD/2) * (1 - f);
						const h = bowlHeight + Math.sin(f * Math.PI / 2) * 1.2;
						points.push(new THREE.Vector2(r, h));
					}
				} else {
					points.push(new THREE.Vector2(bowlD/2 + 0.08, bowlHeight));
					for (let i = floorSegs; i >= 0; i--) {
						const f = i / floorSegs;
						const r = f * (bowlD/2) + 0.08;
						const h = Math.pow(f, 2) * bowlHeight - 0.06;
						points.push(new THREE.Vector2(r, h));
					}
					points.push(new THREE.Vector2(0, -0.06));
				}
				
				const bowlGeo = new THREE.LatheGeometry(points, 128);
				
				// --- Kivágási logika ---
				const positionAttr = bowlGeo.attributes.position;
				const indexAttr = bowlGeo.index;
				const newIndices = [];

				// JAVÍTOTT: Dinamikus elforgatás a bemeneti szöghöz képest -22.5 fokkal eltolva
				const rotAngle = startAngle - Math.PI / 8;
				function rotateY(v, angle) {
					const cos = Math.cos(angle);
					const sin = Math.sin(angle);
					return new THREE.Vector3(
						v.x * cos + v.z * sin,
						v.y,
						-v.x * sin + v.z * cos
					);
				}

				// Analitikus bemeneti henger felépítése
				const T_ent = seg.computedStartTangent || new THREE.Vector3(0, 0, -1);
				const P_ent = (seg.computedStartPos || new THREE.Vector3()).clone().sub(center);
				
				const ent_B = P_ent.clone().add(T_ent.clone().multiplyScalar(0.02)); 
				const ent_A = P_ent.clone().sub(T_ent.clone().multiplyScalar(4.0)); 

				const rCut = R_tube * 1.15; 

				function distToSegment(v, a, b) {
					const ab = new THREE.Vector3().subVectors(b, a);
					const av = new THREE.Vector3().subVectors(v, a);
					let u = av.dot(ab) / ab.lengthSq();
					u = Math.max(0, Math.min(1, u));
					const c = a.clone().add(ab.multiplyScalar(u));
					return v.distanceTo(c);
				}

				// JAVÍTOTT: Dinamikus kivezető cső ív mintavételezés a tökéletes, átmérőhöz igazodó vágáshoz
				const nextSegPoints = [];
				const nextSegProps = [];
				const nextStartDist = currentDist + segLen;
				const nextSeg = PARAMS.segments[segIdx + 1];
				if (nextSeg) {
					const nextSegLen = (nextSeg.type === 'straight') ? (nextSeg.len || 0.1) : 
					                   ((parseFloat(nextSeg.radius) || 0.1) * (Math.abs(parseFloat(nextSeg.angle)) * Math.PI / 180));
					const numSamples = 30; 
					for (let s = 0; s <= numSamples; s++) {
						const sampleDist = nextStartDist + (s / numSamples) * nextSegLen;
						const pt = mainPath.getPointAt(Math.max(0, Math.min(1, sampleDist / totalLen)));
						nextSegPoints.push(pt);
						
						const props = getSlideProps(sampleDist);
						nextSegProps.push((props.diameter / 2) * 1.03); // 3% biztonsági ráhagyás a tiszta élekért
					}
				}

				for (let i = 0; i < indexAttr.count; i += 3) {
					const idx0 = indexAttr.getX(i);
					const idx1 = indexAttr.getY(i);
					const idx2 = indexAttr.getZ(i);

					const v0 = new THREE.Vector3(positionAttr.getX(idx0), positionAttr.getY(idx0), positionAttr.getZ(idx0));
					const v1 = new THREE.Vector3(positionAttr.getX(idx1), positionAttr.getY(idx1), positionAttr.getZ(idx1));
					const v2 = new THREE.Vector3(positionAttr.getX(idx2), positionAttr.getY(idx2), positionAttr.getZ(idx2));

					const v0_rot = rotateY(v0, rotAngle);
					const v1_rot = rotateY(v1, rotAngle);
					const v2_rot = rotateY(v2, rotAngle);

					const canCut0 = Math.sqrt(v0_rot.x * v0_rot.x + v0_rot.z * v0_rot.z) > (R_start - 0.2);
					const canCut1 = Math.sqrt(v1_rot.x * v1_rot.x + v1_rot.z * v1_rot.z) > (R_start - 0.2);
					const canCut2 = Math.sqrt(v2_rot.x * v2_rot.x + v2_rot.z * v2_rot.z) > (R_start - 0.2);

					const rCut0 = rCut * (1.0 + Math.max(0, Math.sqrt(v0_rot.x*v0_rot.x + v0_rot.z*v0_rot.z) - R_start) * 0.35);
					const rCut1 = rCut * (1.0 + Math.max(0, Math.sqrt(v1_rot.x*v1_rot.x + v1_rot.z*v1_rot.z) - R_start) * 0.35);
					const rCut2 = rCut * (1.0 + Math.max(0, Math.sqrt(v2_rot.x*v2_rot.x + v2_rot.z*v2_rot.z) - R_start) * 0.35);

					const inEnt = (canCut0 && distToSegment(v0_rot, ent_A, ent_B) < rCut0) || 
					              (canCut1 && distToSegment(v1_rot, ent_A, ent_B) < rCut1) || 
					              (canCut2 && distToSegment(v2_rot, ent_A, ent_B) < rCut2);

					// JAVÍTOTT: Dinamikus kivezető csővágás az elfolyó ág 3D-s íve alapján
					let inCenterHole = false;
					if (nextSegPoints.length > 0) {
						const v0_world = v0_rot.clone().add(center);
						const v1_world = v1_rot.clone().add(center);
						const v2_world = v2_rot.clone().add(center);
						
						let v0_in = false, v1_in = false, v2_in = false;
						for (let s = 0; s < nextSegPoints.length; s++) {
							const limit = nextSegProps[s];
							if (!v0_in && v0_world.distanceTo(nextSegPoints[s]) < limit) v0_in = true;
							if (!v1_in && v1_world.distanceTo(nextSegPoints[s]) < limit) v1_in = true;
							if (!v2_in && v2_world.distanceTo(nextSegPoints[s]) < limit) v2_in = true;
						}
						inCenterHole = v0_in || v1_in || v2_in;
					}

					if (!inEnt && !inCenterHole) {
						newIndices.push(idx0, idx1, idx2);
					}
				}

				bowlGeo.setIndex(newIndices);
				bowlGeo.computeVertexNormals();
				
				let bowlMat;
				const extColor = seg.color || '#ffcc00';
				
				if (isClosed && seg.customTextureBase64) {
					const tex = new THREE.TextureLoader().load(seg.customTextureBase64);
					tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
					tex.repeat.set(8, 4);
					bowlMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
					bowlMat.userData = { alwaysGlow: seg.alwaysGlow };
					customTextureMaterials.push(bowlMat);
				} else {
					bowlMat = new THREE.MeshPhongMaterial({ color: extColor, side: THREE.DoubleSide, shininess: 40 });
				}
				
				const bowlMesh = new THREE.Mesh(bowlGeo, bowlMat);
				bowlMesh.position.copy(center);
				bowlMesh.rotation.y = startAngle - Math.PI / 8; // A tálat is dinamikus bemeneti szögbe forgatjuk
				bowlMesh.castShadow = true; bowlMesh.receiveShadow = true;
				slideGroup.add(bowlMesh);

				// Kivezető cső lerövidítve 0.1 méterre a zuhanásmentes csatlakozáshoz
				const dropLen = 0.1; 
				const exitTubeGeo = new THREE.CylinderGeometry(R_tube, R_tube, dropLen, 32, 1, true);
				const exitMat = new THREE.MeshPhongMaterial({ 
					color: seg.color || '#ffcc00', 
					side: THREE.DoubleSide, 
					shininess: 40 
				});
				const exitMesh = new THREE.Mesh(exitTubeGeo, exitMat);
				exitMesh.position.set(center.x, center.y - dropLen / 2, center.z);
				exitMesh.castShadow = true; exitMesh.receiveShadow = true;
				slideGroup.add(exitMesh);
			}
			currentDist = segEnd;
		});

		
		if (bgPositions.length > 0) {
			const bgGeom = new THREE.BufferGeometry();
			bgGeom.setAttribute('position', new THREE.Float32BufferAttribute(bgPositions, 3));
			bgGeom.setIndex(bgIndices);
			bgGeom.computeVertexNormals();
			slideGroup.add(new THREE.Mesh(bgGeom, orangeMat));
		}
	}
	
	function setAllLEDs(state) {
        for (let r = 0; r < allRings.length; r++) {
            
            if (allRings[r]) {
                for (let l = 0; l < allRings[r].length; l++) {
                    allRings[r][l].visible = state;
                }
            }
        }
    }

	const ledSteps = {
        
        1: [
            { cycles: 4, timePerCycle: 1.0, update: (cp) => {
                setAllLEDs(false); let limit = Math.floor(cp * 16);
                for(let r=0; r<allRings.length; r++) for(let l=0; l<limit; l++) { allRings[r][l].visible = true; allRings[r][16+l].visible = true; }
            }},
            { cycles: 4, timePerCycle: 1.0, update: (cp) => {
                setAllLEDs(false); let eraseLimit = Math.floor(cp * 16);
                for(let r=0; r<allRings.length; r++) for(let l=0; l<16; l++) if (l <= 15 - eraseLimit) { allRings[r][l].visible = true; allRings[r][16+l].visible = true; }
            }},
            { cycles: 4, timePerCycle: 2.0, update: (cp) => {
                setAllLEDs(false);
                if (cp < 0.5) { 
                    let limit = Math.floor((cp / 0.5) * 16);
                    for(let r=0; r<allRings.length; r++) for(let l=0; l<limit; l++) { allRings[r][l].visible = true; allRings[r][16+l].visible = true; }
                } else { 
                    let eraseLimit = Math.floor(((cp - 0.5) / 0.5) * 16);
                    for(let r=0; r<allRings.length; r++) for(let l=0; l<16; l++) if (l <= 15 - eraseLimit) { allRings[r][l].visible = true; allRings[r][16+l].visible = true; }
                }
            }}
        ],
        2: [
            { cycles: 4, timePerCycle: 1.5, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(cp * 32);
                for(let r=0; r<allRings.length; r++) for(let l=0; l<32; l++) if (((l - offset + 320) % 32) % 4 === 0) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 1.5, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(-cp * 32);
                for(let r=0; r<allRings.length; r++) for(let l=0; l<32; l++) if (((l - offset + 320) % 32) % 4 === 0) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 1.5, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(Math.sin(cp * Math.PI * 2) * 4);
                for(let r=0; r<allRings.length; r++) for(let l=0; l<32; l++) if (((l - offset + 320) % 32) % 4 === 0) allRings[r][l].visible = true;
            }}
        ],
        3: [
            { cycles: 4, timePerCycle: 0.8, update: (cp) => { 
                setAllLEDs(false); let limit = Math.floor(cp * 8);
                for(let r=0; r<allRings.length; r++) if ((r % 8) >= 8 - limit) for(let l=0; l<32; l++) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 0.8, update: (cp) => { 
                setAllLEDs(false); let limit = Math.floor(cp * 8);
                for(let r=0; r<allRings.length; r++) if ((r % 8) >= limit) for(let l=0; l<32; l++) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 1.6, update: (cp) => {
                setAllLEDs(false);
                if (cp < 0.5) {
                    let limit = Math.floor((cp / 0.5) * 8);
                    for(let r=0; r<allRings.length; r++) if ((r % 8) >= 8 - limit) for(let l=0; l<32; l++) allRings[r][l].visible = true;
                } else {
                    let eraseLimit = Math.floor(((cp - 0.5) / 0.5) * 8);
                    for(let r=0; r<allRings.length; r++) if ((r % 8) >= eraseLimit) for(let l=0; l<32; l++) allRings[r][l].visible = true;
                }
            }}
        ],
        4: [
            { cycles: 4, timePerCycle: 0.8, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(cp * 8);
                for(let r=0; r<allRings.length; r++) if ((r - offset + 800) % 8 < 2) for(let l=0; l<32; l++) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 0.8, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(-cp * 8);
                for(let r=0; r<allRings.length; r++) if ((r - offset + 800) % 8 < 2) for(let l=0; l<32; l++) allRings[r][l].visible = true;
            }},
            { cycles: 4, timePerCycle: 0.8, update: (cp) => {
                setAllLEDs(false); let offset = Math.floor(Math.sin(cp * Math.PI * 2) * 8);
                for(let r=0; r<allRings.length; r++) if ((r - offset + 800) % 8 < 2) for(let l=0; l<32; l++) allRings[r][l].visible = true;
            }}
        ],
        6: [
